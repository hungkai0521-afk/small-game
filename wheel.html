<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>命運轉盤 · 命運遊樂場</title>
<style>
:root{
  --bg:#0a0e1a; --card:rgba(255,255,255,.055); --border:rgba(255,255,255,.1);
  --text:#eef2ff; --muted:#8b93b0;
  --amber:#f59e0b; --gold:#fbbf24; --rose:#f43f5e; --cyan:#22d3ee; --violet:#a78bfa; --green:#34d399;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
  background:
    radial-gradient(900px 500px at 15% -10%, rgba(34,211,238,.14), transparent 60%),
    radial-gradient(900px 500px at 110% 20%, rgba(167,139,250,.12), transparent 55%),
    var(--bg);
  color:var(--text); min-height:100vh;
  display:flex; justify-content:center; align-items:flex-start;
  padding:calc(env(safe-area-inset-top) + 16px) 20px calc(env(safe-area-inset-bottom) + 20px);
  overflow-x:hidden;
}
.shell{width:100%;max-width:480px;display:flex;flex-direction:column;gap:16px}
.top{display:flex;align-items:center;gap:10px}
.back{
  text-decoration:none;color:var(--muted);font-size:.82rem;font-weight:800;
  background:var(--card);border:1px solid var(--border);border-radius:30px;padding:8px 14px;
}
.top h1{
  flex:1;text-align:center;font-size:1.45rem;font-weight:900;letter-spacing:1px;
  background:linear-gradient(92deg,var(--cyan),var(--violet));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-right:78px;
}
.sub{text-align:center;color:var(--muted);font-size:.78rem;font-weight:700;margin-top:-8px}

.stage{display:flex;justify-content:center;position:relative;padding:14px 0 4px}
.pointer{
  position:absolute;top:2px;left:50%;transform:translateX(-50%);z-index:5;
  width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;
  border-top:24px solid var(--gold);
  filter:drop-shadow(0 4px 10px rgba(251,191,36,.7));
}
.wheel-wrap{
  width:min(78vw,330px);height:min(78vw,330px);position:relative;
  border-radius:50%;
  box-shadow:0 24px 60px -18px rgba(0,0,0,.85), 0 0 0 8px rgba(255,255,255,.05), 0 0 46px -8px rgba(34,211,238,.3);
}
canvas#wheel{width:100%;height:100%;display:block;border-radius:50%}
.hub{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:58px;height:58px;border-radius:50%;
  background:linear-gradient(160deg,#1c2440,#0b1020);
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;z-index:4;
  box-shadow:0 6px 20px rgba(0,0,0,.6);
}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:24px;padding:20px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ibox{display:flex;flex-direction:column;gap:6px}
.ibox label{font-size:.72rem;font-weight:800;color:var(--muted);padding-left:4px}
input[type=text]{
  width:100%;padding:13px;border:2px solid var(--border);border-radius:14px;font-size:1rem;
  outline:none;background:rgba(255,255,255,.04);color:var(--text);
  transition:border-color .2s,background .2s;-webkit-appearance:none;
}
input[type=text]::placeholder{color:#565e78}
input[type=text]:focus{border-color:var(--cyan);background:rgba(34,211,238,.06)}
input[type=text]:disabled{opacity:.35}
.btn{
  width:100%;padding:19px;border:none;border-radius:20px;
  font-size:1.2rem;font-weight:900;letter-spacing:1px;cursor:pointer;color:#04222b;
  background:linear-gradient(140deg,var(--cyan),var(--violet));
  box-shadow:0 10px 28px -8px rgba(34,211,238,.6), inset 0 1px 0 rgba(255,255,255,.4);
  transition:transform .08s,opacity .2s;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4}
.ghost{
  background:transparent;border:none;color:var(--muted);font-size:.85rem;font-weight:700;
  text-decoration:underline;padding:10px;cursor:pointer;width:100%;
}
.foot{text-align:center;font-size:.66rem;color:var(--muted);letter-spacing:1px;line-height:1.8;opacity:.75}
.overlay{
  position:fixed;inset:0;background:rgba(4,6,14,.9);display:none;
  justify-content:center;align-items:center;z-index:1000;padding:24px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.modal{
  background:#10162a;border:1px solid var(--border);
  width:100%;max-width:400px;border-radius:32px;padding:36px 24px 28px;text-align:center;
  box-shadow:0 30px 80px -12px rgba(0,0,0,.8);
  animation:mIn .5s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes mIn{0%{opacity:0;transform:scale(.8) translateY(40px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.w-tag{
  background:linear-gradient(92deg,var(--cyan),var(--violet));color:#04121b;
  padding:6px 16px;border-radius:30px;font-size:.9rem;font-weight:900;margin-bottom:18px;display:inline-block;
}
.w-name{
  font-size:3.4rem;font-weight:900;line-height:1.05;margin:12px 0;word-break:break-word;
  background:linear-gradient(92deg,var(--cyan),var(--violet));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 6px 20px rgba(34,211,238,.4));
}
.w-meta{color:var(--muted);font-size:.95rem;margin-bottom:24px;font-weight:600}
.m-actions{display:flex;gap:10px}
.m-btn{flex:1;padding:17px 10px;border:none;border-radius:16px;font-size:1.02rem;font-weight:900;cursor:pointer;transition:transform .08s}
.m-btn:active{transform:scale(.96)}
.m-btn.again{background:linear-gradient(140deg,var(--cyan),var(--violet));color:#04222b}
.m-btn.edit{background:rgba(255,255,255,.09);color:var(--text);border:1px solid var(--border)}
#confetti{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1500}
</style>
</head>
<body>
<canvas id="confetti"></canvas>

<div class="shell">
  <div class="top">
    <a class="back" href="index.html">← 遊樂場</a>
    <h1>命運轉盤 🎡</h1>
  </div>
  <div class="sub">名字上盤 · 一轉定生死 · 指到誰誰就請</div>

  <div class="stage">
    <div class="pointer"></div>
    <div class="wheel-wrap">
      <canvas id="wheel" width="660" height="660"></canvas>
      <div class="hub">🍹</div>
    </div>
  </div>

  <div class="card">
    <div class="input-grid">
      <div class="ibox"><label>1</label><input type="text" class="p-input" placeholder="名字" maxlength="10"></div>
      <div class="ibox"><label>2</label><input type="text" class="p-input" placeholder="名字" maxlength="10"></div>
      <div class="ibox"><label>3</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
      <div class="ibox"><label>4</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
      <div class="ibox"><label>5</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
      <div class="ibox"><label>6</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
    </div>
  </div>

  <button id="spin-btn" class="btn">🎡 轉出苦主</button>
  <button id="reset-btn" class="ghost">清空名單</button>

  <div class="foot">100% 離線可玩 · CRYPTO 公平亂數 · FATE ARCADE</div>
</div>

<div id="modal-overlay" class="overlay">
  <div class="modal">
    <div class="w-tag">🎯 指針指定</div>
    <div id="winner-text" class="w-name">---</div>
    <div class="w-meta">轉盤停在你身上,這攤你請 💸</div>
    <div class="m-actions">
      <button id="btn-edit" class="m-btn edit">改名單</button>
      <button id="btn-again" class="m-btn again">再轉一次</button>
    </div>
  </div>
</div>

<script>
(function() {
    "use strict";

    const K_NAMES = 'draw_v7_names'; // 與拉霸共用名單
    const COLORS = ['#f59e0b','#22d3ee','#a78bfa','#f43f5e','#34d399','#fbbf24','#60a5fa','#fb923c'];
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const cv = document.getElementById('wheel');
    const ctx = cv.getContext('2d');
    const spinBtn = document.getElementById('spin-btn');
    const resetBtn = document.getElementById('reset-btn');
    const inputs = document.querySelectorAll('.p-input');
    const modal = document.getElementById('modal-overlay');
    const winnerText = document.getElementById('winner-text');
    const btnAgain = document.getElementById('btn-again');
    const btnEdit = document.getElementById('btn-edit');

    let isSpinning = false;
    let audioCtx = null;
    let currentRot = 0; // 累計旋轉角(rad)

    try {
        const saved = JSON.parse(localStorage.getItem(K_NAMES) || 'null');
        if (Array.isArray(saved)) inputs.forEach((inp, i) => { if (saved[i]) inp.value = saved[i]; });
    } catch (e) {}

    function names() {
        const raw = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
        return Array.from(new Set(raw));
    }

    function pick(arr) {
        const n = arr.length;
        const buf = new Uint32Array(1);
        const limit = Math.floor(0xFFFFFFFF / n) * n;
        let x;
        do { crypto.getRandomValues(buf); x = buf[0]; } while (x >= limit);
        return x % n;
    }

    function vibrate(p) { if (!reduceMotion && navigator.vibrate) { try { navigator.vibrate(p); } catch (e) {} } }

    function unlockAudio() {
        if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; } }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function sfx(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        if (type === 'tick') {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'square'; o.frequency.setValueAtTime(2200, now);
            g.gain.setValueAtTime(0.03, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
            o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now + 0.03);
        } else if (type === 'yay') {
            [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = 'triangle'; o.frequency.setValueAtTime(f, now + i * 0.1);
                g.gain.setValueAtTime(0.08, now + i * 0.1);
                g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.6);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.6);
            });
        }
    }

    // 繪製轉盤(以 rot 弧度旋轉)
    function draw(list, rot) {
        const W = cv.width, R = W / 2;
        ctx.clearRect(0, 0, W, W);
        ctx.save();
        ctx.translate(R, R);
        ctx.rotate(rot);
        const n = Math.max(list.length, 1);
        const seg = Math.PI * 2 / n;
        for (let i = 0; i < n; i++) {
            const a0 = -Math.PI / 2 + i * seg;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, R - 6, a0, a0 + seg);
            ctx.closePath();
            ctx.fillStyle = list.length ? COLORS[i % COLORS.length] : '#1c2440';
            ctx.fill();
            ctx.strokeStyle = 'rgba(10,14,26,.9)';
            ctx.lineWidth = 4;
            ctx.stroke();
            if (list.length) {
                ctx.save();
                ctx.rotate(a0 + seg / 2);
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#0a0e1a';
                ctx.font = '900 ' + (list.length > 5 ? 34 : 40) + 'px -apple-system, sans-serif';
                ctx.fillText(list[i].slice(0, 6), R - 34, 0);
                ctx.restore();
            }
        }
        ctx.restore();
        // 外框
        ctx.beginPath();
        ctx.arc(R, R, R - 4, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,.14)';
        ctx.lineWidth = 8;
        ctx.stroke();
    }

    function redrawIdle() {
        const list = names();
        draw(list.length ? list : [], currentRot);
    }

    // 緩動:cubic ease-out
    function easeOut(t) { return 1 - Math.pow(1 - t, 3.2); }

    async function spin() {
        if (isSpinning) return;
        unlockAudio();
        const list = names();
        if (list.length < 2) { alert('請至少輸入兩位參賽者!'); return; }
        localStorage.setItem(K_NAMES, JSON.stringify(Array.from(inputs).map(i => i.value)));
        inputs.forEach(i => i.disabled = true);
        isSpinning = true;
        spinBtn.disabled = true;
        modal.style.display = 'none';

        const idx = pick(list);               // 公平選定苦主
        const n = list.length;
        const seg = Math.PI * 2 / n;
        // 苦主段中心要停在指針(正上方)。段 i 中心初始角 = -PI/2 + (i+0.5)*seg
        // 旋轉 rot 後角度 = 初始 + rot;要 = -PI/2 (mod 2PI) → rotTarget = -(i+0.5)*seg (mod 2PI)
        const base = ((-(idx + 0.5) * seg) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
        // 加一點段內隨機偏移(±35% 段寬)避免每次都停正中
        const jitter = (Math.random() - 0.5) * seg * 0.7;
        const turns = reduceMotion ? 1 : 6;
        const startRot = currentRot % (Math.PI * 2);
        const target = Math.PI * 2 * turns + base + jitter;
        const dur = reduceMotion ? 600 : 4600;
        const t0 = performance.now();
        let lastSegIdx = -1;

        await new Promise(resolve => {
            (function frame(now) {
                const p = Math.min((now - t0) / dur, 1);
                const rot = startRot + (target - startRot) * easeOut(p);
                draw(list, rot);
                // 每跨過一段就 tick
                const passed = Math.floor(rot / seg);
                if (passed !== lastSegIdx) { lastSegIdx = passed; sfx('tick'); vibrate(5); }
                if (p < 1) requestAnimationFrame(frame);
                else { currentRot = rot; resolve(); }
            })(t0);
        });

        sfx('yay');
        vibrate([0, 60, 40, 60, 40, 130]);
        confetti();
        winnerText.textContent = list[idx];
        setTimeout(() => { modal.style.display = 'flex'; isSpinning = false; }, 500);
    }

    function confetti() {
        if (reduceMotion) return;
        const c = document.getElementById('confetti');
        const x = c.getContext('2d');
        const W = c.width = window.innerWidth;
        const H = c.height = window.innerHeight;
        const colors = COLORS;
        const P = Array.from({ length: 140 }, () => ({
            x: Math.random() * W, y: -20 - Math.random() * H * 0.3,
            r: 5 + Math.random() * 7, c: colors[Math.floor(Math.random() * colors.length)],
            vx: -2.5 + Math.random() * 5, vy: 3 + Math.random() * 4,
            rot: Math.random() * 6.28, vr: -0.25 + Math.random() * 0.5
        }));
        let t = 0;
        (function frame() {
            x.clearRect(0, 0, W, H);
            for (const p of P) {
                p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.rot += p.vr;
                x.save(); x.translate(p.x, p.y); x.rotate(p.rot);
                x.fillStyle = p.c; x.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
                x.restore();
            }
            t++;
            if (t < 200) requestAnimationFrame(frame);
            else x.clearRect(0, 0, W, H);
        })();
    }

    spinBtn.addEventListener('click', spin);
    resetBtn.addEventListener('click', () => {
        if (isSpinning) return;
        localStorage.removeItem(K_NAMES);
        inputs.forEach(i => { i.value = ''; i.disabled = false; });
        currentRot = 0;
        redrawIdle();
        spinBtn.disabled = false;
    });
    btnAgain.addEventListener('click', () => { modal.style.display = 'none'; spinBtn.disabled = false; spin(); });
    btnEdit.addEventListener('click', () => {
        modal.style.display = 'none';
        inputs.forEach(i => i.disabled = false);
        spinBtn.disabled = false;
    });
    inputs.forEach(inp => {
        inp.addEventListener('input', redrawIdle);
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); spin(); } });
    });

    redrawIdle();
})();
</script>
</body>
</html>
