<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>命運遊樂場 · 誰請客交給命運</title>
<style>
:root{
  --bg:#0a0e1a; --card:rgba(255,255,255,.055); --border:rgba(255,255,255,.1);
  --text:#eef2ff; --muted:#8b93b0;
  --amber:#f59e0b; --rose:#f43f5e; --cyan:#22d3ee; --violet:#a78bfa; --green:#34d399;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
  background:
    radial-gradient(900px 500px at 15% -10%, rgba(167,139,250,.16), transparent 60%),
    radial-gradient(900px 500px at 110% 15%, rgba(34,211,238,.13), transparent 55%),
    radial-gradient(700px 500px at 50% 110%, rgba(244,63,94,.12), transparent 60%),
    var(--bg);
  color:var(--text); min-height:100vh;
  display:flex; justify-content:center;
  padding:calc(env(safe-area-inset-top) + 28px) 20px calc(env(safe-area-inset-bottom) + 28px);
}
.shell{width:100%;max-width:480px;display:flex;flex-direction:column;gap:22px}
.hero{text-align:center;padding:14px 0 4px}
.hero .dice{font-size:3.2rem;filter:drop-shadow(0 8px 24px rgba(245,158,11,.45));animation:bob 3s ease-in-out infinite;display:inline-block}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-8px) rotate(6deg)}}
h1{
  font-size:2.1rem;font-weight:900;letter-spacing:1px;margin-top:8px;
  background:linear-gradient(92deg,var(--amber),var(--rose) 55%,var(--violet));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero p{color:var(--muted);font-size:.92rem;font-weight:600;margin-top:6px;letter-spacing:.5px}
.grid{display:flex;flex-direction:column;gap:14px}
.game{
  display:flex;align-items:center;gap:16px;
  background:var(--card);border:1px solid var(--border);border-radius:24px;
  padding:18px 20px;text-decoration:none;color:var(--text);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  transition:transform .15s ease, border-color .2s, box-shadow .2s;
  position:relative;overflow:hidden;
}
.game::before{
  content:"";position:absolute;inset:0;border-radius:24px;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.07) 50%,transparent 70%);
  transform:translateX(-100%);transition:transform .6s;
}
.game:hover::before,.game:active::before{transform:translateX(100%)}
.game:active{transform:scale(.975)}
.game .ico{
  font-size:2rem;width:64px;height:64px;flex:none;
  display:flex;align-items:center;justify-content:center;
  border-radius:18px;background:rgba(255,255,255,.05);border:1px solid var(--border);
}
.game[data-c="amber"] .ico{box-shadow:0 0 26px -4px rgba(245,158,11,.55)}
.game[data-c="cyan"]  .ico{box-shadow:0 0 26px -4px rgba(34,211,238,.55)}
.game[data-c="violet"] .ico{box-shadow:0 0 26px -4px rgba(167,139,250,.55)}
.game[data-c="rose"]  .ico{box-shadow:0 0 26px -4px rgba(244,63,94,.55)}
.game .txt{flex:1;min-width:0}
.game .txt b{font-size:1.15rem;font-weight:900;letter-spacing:.5px;display:block}
.game .txt span{color:var(--muted);font-size:.8rem;font-weight:600;display:block;margin-top:3px}
.game .go{
  flex:none;font-size:1rem;font-weight:900;color:#0a0e1a;
  background:linear-gradient(140deg,var(--amber),var(--rose));
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px -4px rgba(244,63,94,.6);
}
.foot{text-align:center;color:var(--muted);font-size:.7rem;font-weight:600;letter-spacing:1px;line-height:1.9;opacity:.8}
</style>
</head>
<body>
<div class="shell">
  <div class="hero">
    <div class="dice">🎲</div>
    <h1>命運遊樂場</h1>
    <p>誰請客?吵什麼,交給命運決定</p>
  </div>

  <div class="grid">
    <a class="game" data-c="amber" href="drink_app.html">
      <div class="ico">🎰</div>
      <div class="txt"><b>命運拉霸</b><span>五軸連線,連到誰誰就請 · 經典款</span></div>
      <div class="go">➜</div>
    </a>
    <a class="game" data-c="cyan" href="wheel.html">
      <div class="ico">🎡</div>
      <div class="txt"><b>命運轉盤</b><span>名字上盤,一轉定生死</span></div>
      <div class="go">➜</div>
    </a>
    <a class="game" data-c="violet" href="guess.html">
      <div class="ico">🔢</div>
      <div class="txt"><b>終極密碼</b><span>1~100 輪流夾擊,猜中的人買單</span></div>
      <div class="go">➜</div>
    </a>
    <a class="game" data-c="rose" href="reflex.html">
      <div class="ico">⚡</div>
      <div class="txt"><b>手速對決</b><span>輪流拚反應速度,最慢的請客</span></div>
      <div class="go">➜</div>
    </a>
  </div>

  <div class="foot">
    100% 離線可玩 · 無外部連線 · 公平 CRYPTO 亂數<br>
    FATE ARCADE v1
  </div>
</div>
</body>
</html>
