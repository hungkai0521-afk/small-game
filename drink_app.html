<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="命運拉霸">
<meta name="theme-color" content="#0a0e1a">

<title>命運拉霸 · 命運遊樂場</title>
<style>
:root{
  --bg:#0a0e1a; --card:rgba(255,255,255,.055); --border:rgba(255,255,255,.1);
  --text:#eef2ff; --muted:#8b93b0;
  --amber:#f59e0b; --gold:#fbbf24; --rose:#f43f5e; --violet:#a78bfa; --green:#34d399;
  --slot-h:76px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
  background:
    radial-gradient(900px 500px at 15% -10%, rgba(245,158,11,.14), transparent 60%),
    radial-gradient(900px 500px at 110% 20%, rgba(244,63,94,.1), transparent 55%),
    var(--bg);
  color:var(--text); min-height:100vh;
  display:flex; justify-content:center; align-items:flex-start;
  padding:calc(env(safe-area-inset-top) + 16px) 20px calc(env(safe-area-inset-bottom) + 20px);
  overflow-x:hidden;
}
.shell{width:100%;max-width:480px;display:flex;flex-direction:column;gap:16px}
.top{display:flex;align-items:center;gap:10px}
.back{
  text-decoration:none;color:var(--muted);font-size:.82rem;font-weight:800;
  background:var(--card);border:1px solid var(--border);border-radius:30px;padding:8px 14px;
}
.top h1{
  flex:1;text-align:center;font-size:1.45rem;font-weight:900;letter-spacing:1px;
  background:linear-gradient(92deg,var(--amber),var(--rose));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-right:78px; /* 平衡返回鍵寬度 */
}
.sub{text-align:center;color:var(--muted);font-size:.78rem;font-weight:700;margin-top:-8px}

/* 拉霸機 */
.deck{
  display:flex;gap:5px;
  background:linear-gradient(180deg,#141a2e,#0b1020);
  padding:12px;border-radius:24px;border:2px solid var(--border);
  box-shadow:0 24px 50px -18px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.06);
  height:calc(var(--slot-h) + 24px);position:relative;
  transition:box-shadow .4s,border-color .4s;
}
.deck.jackpot{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(251,191,36,.3), 0 22px 55px -10px rgba(251,191,36,.45);
}
.deck::after{
  content:"";position:absolute;left:8px;right:8px;top:calc(50% - 1px);height:2px;
  background:linear-gradient(90deg,transparent,rgba(251,191,36,.65),transparent);
  z-index:10;pointer-events:none;box-shadow:0 0 14px 2px rgba(245,158,11,.3);
}
.slot-col{
  flex:1;min-width:0;background:#05070f;border-radius:10px;overflow:hidden;position:relative;
  border:1px solid rgba(255,255,255,.07);
  box-shadow:inset 0 10px 14px -8px rgba(0,0,0,.95), inset 0 -10px 14px -8px rgba(0,0,0,.95);
}
.slot-rail{width:100%;display:flex;flex-direction:column}
.slot-item{
  height:var(--slot-h);min-height:var(--slot-h);
  display:flex;align-items:center;justify-content:center;
  color:var(--text);font-size:.82rem;font-weight:800;text-align:center;
  padding:4px;line-height:1.05;overflow:hidden;word-break:break-word;
  text-shadow:0 2px 6px rgba(0,0,0,.8);
}
.slot-item.lit{
  color:#1a1204;background:radial-gradient(circle at 50% 35%,var(--gold),var(--amber));
  text-shadow:none;animation:pop .4s ease;
}
@keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.12)}100%{transform:scale(1)}}

/* 名單卡 */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:24px;padding:20px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ibox{display:flex;flex-direction:column;gap:6px}
.ibox label{font-size:.72rem;font-weight:800;color:var(--muted);padding-left:4px}
input[type=text]{
  width:100%;padding:13px;border:2px solid var(--border);border-radius:14px;font-size:1rem;
  outline:none;background:rgba(255,255,255,.04);color:var(--text);
  transition:border-color .2s,background .2s;-webkit-appearance:none;
}
input[type=text]::placeholder{color:#565e78}
input[type=text]:focus{border-color:var(--amber);background:rgba(245,158,11,.06)}
input[type=text]:disabled{opacity:.35}
.opt-row{
  display:flex;align-items:center;gap:10px;margin-top:16px;padding-top:14px;
  border-top:1px dashed var(--border);
}
.opt-row label{
  font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:8px;
  cursor:pointer;user-select:none;color:var(--text);
}
.opt-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--amber)}

/* 按鈕 */
.controls{display:flex;flex-direction:column;gap:4px}
.btn{
  width:100%;padding:19px;border:none;border-radius:20px;
  font-size:1.2rem;font-weight:900;letter-spacing:1px;cursor:pointer;color:#1a1204;
  background:linear-gradient(140deg,var(--gold),var(--amber) 45%,var(--rose));
  box-shadow:0 10px 28px -8px rgba(244,63,94,.65), inset 0 1px 0 rgba(255,255,255,.4);
  transition:transform .08s,opacity .2s;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4}
.btn.spinning{animation:buzz .4s linear infinite}
@keyframes buzz{0%,100%{transform:translateY(0)}25%{transform:translateY(-1px)}75%{transform:translateY(1px)}}
.ghost{
  background:transparent;border:none;color:var(--muted);font-size:.85rem;font-weight:700;
  text-decoration:underline;padding:10px;cursor:pointer;width:100%;
}

/* 紀錄 */
.h-head{
  display:flex;justify-content:space-between;align-items:center;
  font-size:.7rem;font-weight:800;color:var(--muted);margin-bottom:8px;letter-spacing:1px;
}
.h-clear{cursor:pointer;text-decoration:underline}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  background:rgba(167,139,250,.12);color:var(--violet);border:1px solid rgba(167,139,250,.3);
  padding:4px 10px;border-radius:20px;font-size:.78rem;font-weight:800;
}
.chip.latest{background:var(--rose);color:#fff;border-color:var(--rose);box-shadow:0 4px 14px -4px rgba(244,63,94,.7)}
.chips .empty{color:var(--muted);font-size:.78rem}
.foot{text-align:center;font-size:.66rem;color:var(--muted);letter-spacing:1px;line-height:1.8;opacity:.75}

/* 彈窗 */
.overlay{
  position:fixed;inset:0;background:rgba(4,6,14,.9);display:none;
  justify-content:center;align-items:center;z-index:1000;padding:24px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.modal{
  background:#10162a;border:1px solid var(--border);
  width:100%;max-width:400px;border-radius:32px;padding:36px 24px 28px;text-align:center;
  box-shadow:0 30px 80px -12px rgba(0,0,0,.8);
  animation:mIn .5s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes mIn{0%{opacity:0;transform:scale(.8) translateY(40px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.w-tag{
  background:linear-gradient(92deg,var(--green),#22d3ee);color:#062117;
  padding:6px 16px;border-radius:30px;font-size:.9rem;font-weight:900;
  margin-bottom:18px;display:inline-block;
}
.w-name{
  font-size:3.4rem;font-weight:900;line-height:1.05;margin:12px 0;word-break:break-word;
  background:linear-gradient(92deg,var(--gold),var(--rose));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 6px 20px rgba(244,63,94,.4));
}
.w-meta{color:var(--muted);font-size:.95rem;margin-bottom:24px;font-weight:600}
.m-actions{display:flex;gap:10px}
.m-btn{
  flex:1;padding:17px 10px;border:none;border-radius:16px;
  font-size:1.02rem;font-weight:900;cursor:pointer;transition:transform .08s;
}
.m-btn:active{transform:scale(.96)}
.m-btn.again{background:linear-gradient(140deg,var(--gold),var(--rose));color:#1a1204}
.m-btn.edit{background:rgba(255,255,255,.09);color:var(--text);border:1px solid var(--border)}
#confetti{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1500}
</style>
</head>
<body>
<canvas id="confetti"></canvas>

<div class="shell">
  <div class="top">
    <a class="back" href="index.html">← 遊樂場</a>
    <h1>命運拉霸 🎰</h1>
  </div>
  <div class="sub">五軸各自隨機 · 出現最多次的人請 · 平手進決勝輪</div>

  <div class="deck" id="deck">
    <div class="slot-col"><div class="slot-rail" id="r-0"><div class="slot-item">?</div></div></div>
    <div class="slot-col"><div class="slot-rail" id="r-1"><div class="slot-item">?</div></div></div>
    <div class="slot-col"><div class="slot-rail" id="r-2"><div class="slot-item">🍹</div></div></div>
    <div class="slot-col"><div class="slot-rail" id="r-3"><div class="slot-item">?</div></div></div>
    <div class="slot-col"><div class="slot-rail" id="r-4"><div class="slot-item">?</div></div></div>
  </div>

  <div class="card">
    <div class="input-grid">
      <div class="ibox"><label>1</label><input type="text" class="p-input" placeholder="名字" maxlength="10"></div>
      <div class="ibox"><label>2</label><input type="text" class="p-input" placeholder="名字" maxlength="10"></div>
      <div class="ibox"><label>3</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
      <div class="ibox"><label>4</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
      <div class="ibox"><label>5</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
      <div class="ibox"><label>6</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
    </div>
    <div class="opt-row">
      <label><input type="checkbox" id="excl-last"> 排除上一位買單者(避免連莊)</label>
    </div>
  </div>

  <div class="controls">
    <button id="spin-btn" class="btn">🎰 抽出苦主</button>
    <button id="reset-btn" class="ghost">清空名單</button>
  </div>

  <div class="card">
    <div class="h-head"><span>最近買單</span><span class="h-clear" id="hist-clear">清除紀錄</span></div>
    <div class="chips" id="hist-chips"><span class="empty">還沒有紀錄</span></div>
  </div>

  <div class="foot">100% 離線可玩 · CRYPTO 公平亂數 · FATE ARCADE</div>
</div>

<div id="modal-overlay" class="overlay">
  <div class="modal">
    <div id="modal-tag" class="w-tag">🎯 命運指定</div>
    <div id="winner-text" class="w-name">---</div>
    <div id="winner-meta" class="w-meta">這攤你請 💸</div>
    <div class="m-actions">
      <button id="btn-edit" class="m-btn edit">改名單</button>
      <button id="btn-again" class="m-btn again">再抽一次</button>
    </div>
  </div>
</div>

<script>
(function() {
    "use strict";

    let isSpinning = false;
    let audioCtx = null;
    let lastLoser = null;
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const spinBtn   = document.getElementById('spin-btn');
    const resetBtn  = document.getElementById('reset-btn');
    const rails     = [0,1,2,3,4].map(i => document.getElementById('r-' + i));
    const inputs    = document.querySelectorAll('.p-input');
    const exclLast  = document.getElementById('excl-last');
    const deck      = document.getElementById('deck');
    const modal     = document.getElementById('modal-overlay');
    const winnerText= document.getElementById('winner-text');
    const winnerMeta= document.getElementById('winner-meta');
    const modalTag  = document.getElementById('modal-tag');
    const btnAgain  = document.getElementById('btn-again');
    const btnEdit   = document.getElementById('btn-edit');
    const histChips = document.getElementById('hist-chips');
    const histClear = document.getElementById('hist-clear');

    const ITEM_H = 76;

    const K_NAMES = 'draw_v7_names', K_HIST = 'draw_v7_hist', K_EXCL = 'draw_v7_excl';
    try {
        const savedNames = JSON.parse(localStorage.getItem(K_NAMES) || 'null');
        if (Array.isArray(savedNames)) inputs.forEach((inp, i) => { if (savedNames[i]) inp.value = savedNames[i]; });
        exclLast.checked = localStorage.getItem(K_EXCL) === '1';
    } catch (e) {}
    let history = loadHistory();
    lastLoser = history[0] || null;
    renderHistory();

    function loadHistory() {
        try { const h = JSON.parse(localStorage.getItem(K_HIST) || '[]'); return Array.isArray(h) ? h : []; }
        catch (e) { return []; }
    }
    function saveNames() {
        localStorage.setItem(K_NAMES, JSON.stringify(Array.from(inputs).map(i => i.value)));
    }

    // crypto 無偏取樣
    function randInt(min, max) { // [min, max] 含端點
        const n = max - min + 1;
        const buf = new Uint32Array(1);
        const limit = Math.floor(0xFFFFFFFF / n) * n;
        let x;
        do { crypto.getRandomValues(buf); x = buf[0]; } while (x >= limit);
        return min + (x % n);
    }
    function pick(arr) { return arr[randInt(0, arr.length - 1)]; }
    function shuffle(a) {
        for (let i = a.length - 1; i > 0; i--) {
            const j = randInt(0, i);
            const t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
    }

    function vibrate(p) { if (!reduceMotion && navigator.vibrate) { try { navigator.vibrate(p); } catch (e) {} } }
    function safe(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function unlockAudio() {
        if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; } }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playSfx(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        if (type === 'tick') {
            const bSize = Math.floor(audioCtx.sampleRate * 0.05);
            const b = audioCtx.createBuffer(1, bSize, audioCtx.sampleRate);
            const d = b.getChannelData(0);
            for (let i = 0; i < bSize; i++) d[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = b;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass'; filter.frequency.setValueAtTime(3000, now);
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.05, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
            noise.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
            noise.start(now); noise.stop(now + 0.04);
        } else if (type === 'ding') {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now);
            g.gain.setValueAtTime(0.12, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.5);
        } else if (type === 'yay') {
            [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = 'triangle'; o.frequency.setValueAtTime(f, now + i * 0.1);
                g.gain.setValueAtTime(0.08, now + i * 0.1);
                g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.6);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.6);
            });
        }
    }

    function confetti() {
        if (reduceMotion) return;
        const cv = document.getElementById('confetti');
        const ctx = cv.getContext('2d');
        const W = cv.width = window.innerWidth;
        const H = cv.height = window.innerHeight;
        const colors = ['#f59e0b', '#22d3ee', '#34d399', '#f43f5e', '#a78bfa', '#fbbf24'];
        const P = Array.from({ length: 140 }, () => ({
            x: Math.random() * W, y: -20 - Math.random() * H * 0.3,
            r: 5 + Math.random() * 7, c: colors[Math.floor(Math.random() * colors.length)],
            vx: -2.5 + Math.random() * 5, vy: 3 + Math.random() * 4,
            rot: Math.random() * 6.28, vr: -0.25 + Math.random() * 0.5
        }));
        let t = 0;
        (function frame() {
            ctx.clearRect(0, 0, W, H);
            for (const p of P) {
                p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.rot += p.vr;
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
                ctx.fillStyle = p.c; ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
                ctx.restore();
            }
            t++;
            if (t < 200) requestAnimationFrame(frame);
            else ctx.clearRect(0, 0, W, H);
        })();
    }

    function animateReel(rail, idx, face, pool) {
        return new Promise(resolve => {
            const N = 24;
            let html = '';
            for (let i = 0; i < N; i++) html += '<div class="slot-item">' + safe(pick(pool)) + '</div>';
            html += '<div class="slot-item final">' + safe(face) + '</div>';

            rail.style.transition = 'none';
            rail.style.transform = 'translateY(0)';
            rail.innerHTML = html;

            // rAF 啟動,120ms timeout 後備(背景分頁 rAF 可能不觸發)
            let started = false;
            const kick = () => {
                if (started) return;
                started = true;
                const dur = reduceMotion ? 0.4 : (2.0 + idx * 0.35);
                let ticker = null;
                if (!reduceMotion) {
                    ticker = setInterval(() => { playSfx('tick'); vibrate(6); }, (dur * 1000) / N);
                }
                rail.style.transition = 'transform ' + dur + 's cubic-bezier(0.12, 0, 0, 1)';
                rail.style.transform = 'translateY(-' + (N * ITEM_H) + 'px)';
                setTimeout(() => {
                    if (ticker) clearInterval(ticker);
                    playSfx('ding'); vibrate(28);
                    resolve();
                }, dur * 1000);
            };
            requestAnimationFrame(() => requestAnimationFrame(kick));
            setTimeout(kick, 120);
        });
    }

    let tiePool = null; // 平手決勝輪的候選人

    async function spin() {
        if (isSpinning) return;
        unlockAudio();

        const raw = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
        const uniq = Array.from(new Set(raw));
        if (uniq.length < 2) { alert('請至少輸入兩位參賽者!'); return; }

        saveNames();
        inputs.forEach(i => i.disabled = true);

        // 抽池:決勝輪只剩平手者;首輪可排除上一位
        let pool;
        if (tiePool && tiePool.length > 1) {
            pool = tiePool.slice();
        } else {
            pool = uniq.slice();
            if (exclLast.checked && lastLoser && uniq.length > 2 && pool.includes(lastLoser)) {
                pool = pool.filter(n => n !== lastLoser);
            }
        }

        isSpinning = true;
        spinBtn.disabled = true;
        spinBtn.classList.add('spinning');
        deck.classList.remove('jackpot');
        modal.style.display = 'none';

        // 五軸各自獨立隨機,轉完才知道答案
        const faces = Array.from({ length: rails.length }, () => pick(pool));

        await Promise.all(rails.map((rail, idx) =>
            animateReel(rail, idx, faces[idx], pool)));

        // 開票:出現最多次的人請;同票 → 決勝輪
        const counts = {};
        faces.forEach(n => counts[n] = (counts[n] || 0) + 1);
        let max = 0, top = [];
        for (const n in counts) {
            if (counts[n] > max) { max = counts[n]; top = [n]; }
            else if (counts[n] === max) top.push(n);
        }
        // 點亮最高票的格子
        rails.forEach((rail, i) => {
            if (top.includes(faces[i]) && rail.lastElementChild) rail.lastElementChild.classList.add('lit');
        });

        if (top.length === 1) {
            tiePool = null;
            const loser = top[0];
            lastLoser = loser;
            pushHistory(loser);
            celebrate(loser, max);
        } else {
            tiePool = top;
            showTie(top, max);
        }
    }

    function celebrate(loser, max) {
        playSfx('yay');
        vibrate([0, 60, 40, 60, 40, 130]);
        confetti();
        deck.classList.add('jackpot');
        modalTag.textContent = '🎯 命運指定';
        winnerText.style.fontSize = '';
        winnerText.textContent = loser;
        winnerMeta.textContent = '開出 ' + max + '/5 格最多!這攤換你請 💸';
        btnAgain.textContent = '再抽一次';
        setTimeout(() => {
            modal.style.display = 'flex';
            spinBtn.classList.remove('spinning');
            isSpinning = false;
        }, 650);
    }

    function showTie(top, max) {
        playSfx('ding');
        vibrate([0, 40, 30, 40]);
        modalTag.textContent = '⚡ 平手決賽';
        winnerText.style.fontSize = '1.9rem';
        winnerText.textContent = top.join('、');
        winnerMeta.textContent = '都開出 ' + max + ' 格!只有你們進決勝輪 🔥';
        btnAgain.textContent = '⚡ 啟動決勝輪';
        setTimeout(() => {
            modal.style.display = 'flex';
            spinBtn.classList.remove('spinning');
            isSpinning = false;
        }, 650);
    }

    function pushHistory(name) {
        history.unshift(name);
        history = history.slice(0, 8);
        localStorage.setItem(K_HIST, JSON.stringify(history));
        renderHistory();
    }
    function renderHistory() {
        if (!history.length) { histChips.innerHTML = '<span class="empty">還沒有紀錄</span>'; return; }
        histChips.innerHTML = history
            .map((n, i) => '<span class="chip' + (i === 0 ? ' latest' : '') + '">' + safe(n) + '</span>')
            .join('');
    }

    spinBtn.addEventListener('click', spin);

    resetBtn.addEventListener('click', () => {
        if (isSpinning) return;
        tiePool = null;
        localStorage.removeItem(K_NAMES);
        inputs.forEach(i => { i.value = ''; i.disabled = false; });
        deck.classList.remove('jackpot');
        rails.forEach(r => { r.innerHTML = '<div class="slot-item">?</div>'; r.style.transition = 'none'; r.style.transform = 'translateY(0)'; });
        modal.style.display = 'none';
        spinBtn.disabled = false;
    });

    exclLast.addEventListener('change', () => {
        localStorage.setItem(K_EXCL, exclLast.checked ? '1' : '0');
    });

    histClear.addEventListener('click', () => {
        history = [];
        localStorage.removeItem(K_HIST);
        renderHistory();
    });

    btnAgain.addEventListener('click', () => {
        modal.style.display = 'none';
        spinBtn.disabled = false;
        spin();
    });

    btnEdit.addEventListener('click', () => {
        modal.style.display = 'none';
        tiePool = null;
        inputs.forEach(i => i.disabled = false);
        deck.classList.remove('jackpot');
        rails.forEach(r => { r.querySelectorAll('.lit').forEach(el => el.classList.remove('lit')); });
        spinBtn.disabled = false;
    });

    inputs.forEach(inp => inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); spin(); }
    }));
})();
</script>
</body>
</html>
