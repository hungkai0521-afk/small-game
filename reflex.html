<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>手速對決 · 命運遊樂場</title>
<style>
:root{
  --bg:#0a0e1a; --card:rgba(255,255,255,.055); --border:rgba(255,255,255,.1);
  --text:#eef2ff; --muted:#8b93b0;
  --amber:#f59e0b; --gold:#fbbf24; --rose:#f43f5e; --cyan:#22d3ee; --violet:#a78bfa; --green:#34d399;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
  background:
    radial-gradient(900px 500px at 15% -10%, rgba(244,63,94,.14), transparent 60%),
    radial-gradient(900px 500px at 110% 20%, rgba(245,158,11,.1), transparent 55%),
    var(--bg);
  color:var(--text); min-height:100vh;
  display:flex; justify-content:center; align-items:flex-start;
  padding:calc(env(safe-area-inset-top) + 16px) 20px calc(env(safe-area-inset-bottom) + 20px);
  overflow-x:hidden;
}
.shell{width:100%;max-width:480px;display:flex;flex-direction:column;gap:16px}
.top{display:flex;align-items:center;gap:10px}
.back{
  text-decoration:none;color:var(--muted);font-size:.82rem;font-weight:800;
  background:var(--card);border:1px solid var(--border);border-radius:30px;padding:8px 14px;
}
.top h1{
  flex:1;text-align:center;font-size:1.45rem;font-weight:900;letter-spacing:1px;
  background:linear-gradient(92deg,var(--rose),var(--amber));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-right:78px;
}
.sub{text-align:center;color:var(--muted);font-size:.78rem;font-weight:700;margin-top:-8px}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:24px;padding:20px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ibox{display:flex;flex-direction:column;gap:6px}
.ibox label{font-size:.72rem;font-weight:800;color:var(--muted);padding-left:4px}
input[type=text]{
  width:100%;padding:13px;border:2px solid var(--border);border-radius:14px;font-size:1rem;
  outline:none;background:rgba(255,255,255,.04);color:var(--text);
  transition:border-color .2s,background .2s;-webkit-appearance:none;
}
input::placeholder{color:#565e78}
input:focus{border-color:var(--rose);background:rgba(244,63,94,.07)}
.btn{
  width:100%;padding:19px;border:none;border-radius:20px;
  font-size:1.2rem;font-weight:900;letter-spacing:1px;cursor:pointer;color:#2b0710;
  background:linear-gradient(140deg,var(--rose),var(--amber));
  box-shadow:0 10px 28px -8px rgba(244,63,94,.6), inset 0 1px 0 rgba(255,255,255,.4);
  transition:transform .08s,opacity .2s;
}
.btn:active{transform:scale(.97)}
.ghost{
  background:transparent;border:none;color:var(--muted);font-size:.85rem;font-weight:700;
  text-decoration:underline;padding:10px;cursor:pointer;width:100%;
}
.foot{text-align:center;font-size:.66rem;color:var(--muted);letter-spacing:1px;line-height:1.8;opacity:.75}

/* 競技場 */
#arena{
  display:none;position:fixed;inset:0;z-index:900;
  align-items:center;justify-content:center;flex-direction:column;gap:18px;
  text-align:center;padding:40px 24px;user-select:none;-webkit-user-select:none;
  transition:background .12s;
}
#arena.idle{background:#0a0e1a}
#arena.armed{background:#3f0d1d}
#arena.go{background:#065f46}
#arena .big{font-size:2rem;font-weight:900;line-height:1.3}
#arena .huge{font-size:4.2rem;font-weight:900;letter-spacing:2px;filter:drop-shadow(0 8px 30px rgba(0,0,0,.6))}
#arena .hint{color:rgba(255,255,255,.65);font-size:.95rem;font-weight:700}
#arena .ms{font-size:3.4rem;font-weight:900;color:var(--gold)}

/* 排行榜 */
.rank{list-style:none;display:flex;flex-direction:column;gap:8px;margin:14px 0 20px}
.rank li{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:14px;padding:11px 14px;font-weight:800;font-size:1rem;
}
.rank li .pos{width:26px;flex:none;color:var(--muted)}
.rank li .nm{flex:1;text-align:left}
.rank li .tm{color:var(--cyan);font-variant-numeric:tabular-nums}
.rank li.slowest{border-color:var(--rose);background:rgba(244,63,94,.14)}
.rank li.slowest .tm{color:var(--rose)}

/* 彈窗 */
.overlay{
  position:fixed;inset:0;background:rgba(4,6,14,.9);display:none;
  justify-content:center;align-items:center;z-index:1000;padding:24px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.modal{
  background:#10162a;border:1px solid var(--border);
  width:100%;max-width:400px;border-radius:32px;padding:32px 24px 26px;text-align:center;
  box-shadow:0 30px 80px -12px rgba(0,0,0,.8);
  animation:mIn .5s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes mIn{0%{opacity:0;transform:scale(.8) translateY(40px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.w-tag{
  background:linear-gradient(92deg,var(--rose),var(--amber));color:#2b0710;
  padding:6px 16px;border-radius:30px;font-size:.9rem;font-weight:900;margin-bottom:14px;display:inline-block;
}
.w-name{
  font-size:2.8rem;font-weight:900;line-height:1.05;margin:8px 0 2px;word-break:break-word;
  background:linear-gradient(92deg,var(--rose),var(--amber));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 6px 20px rgba(244,63,94,.4));
}
.w-meta{color:var(--muted);font-size:.9rem;font-weight:600}
.m-actions{display:flex;gap:10px}
.m-btn{flex:1;padding:16px 10px;border:none;border-radius:16px;font-size:1rem;font-weight:900;cursor:pointer;transition:transform .08s}
.m-btn:active{transform:scale(.96)}
.m-btn.again{background:linear-gradient(140deg,var(--rose),var(--amber));color:#2b0710}
.m-btn.edit{background:rgba(255,255,255,.09);color:var(--text);border:1px solid var(--border)}
#confetti{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1500}
</style>
</head>
<body>
<canvas id="confetti"></canvas>

<div class="shell">
  <div class="top">
    <a class="back" href="index.html">← 遊樂場</a>
    <h1>手速對決 ⚡</h1>
  </div>
  <div class="sub">輪流測反應 · 偷跑罰 1 秒 · 最慢的請客</div>

  <div id="setup">
    <div class="card">
      <div class="input-grid">
        <div class="ibox"><label>1</label><input type="text" class="p-input" placeholder="名字" maxlength="10"></div>
        <div class="ibox"><label>2</label><input type="text" class="p-input" placeholder="名字" maxlength="10"></div>
        <div class="ibox"><label>3</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
        <div class="ibox"><label>4</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
        <div class="ibox"><label>5</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
        <div class="ibox"><label>6</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
      </div>
    </div>
    <div style="height:14px"></div>
    <button id="start-btn" class="btn">⚡ 開始對決</button>
    <button id="reset-btn" class="ghost">清空名單</button>
  </div>

  <div class="foot">100% 離線可玩 · 手機輪流傳 · FATE ARCADE</div>
</div>

<!-- 全螢幕競技場 -->
<div id="arena" class="idle">
  <div class="big" id="a-title">輪到 —</div>
  <div class="huge" id="a-main">👆</div>
  <div class="hint" id="a-hint">點一下開始</div>
</div>

<div id="modal-overlay" class="overlay">
  <div class="modal">
    <div class="w-tag">🐢 最慢的人</div>
    <div id="winner-text" class="w-name">---</div>
    <div class="w-meta" id="winner-meta">手速墊底,這攤你請 💸</div>
    <ul class="rank" id="rank"></ul>
    <div class="m-actions">
      <button id="btn-edit" class="m-btn edit">改名單</button>
      <button id="btn-again" class="m-btn again">再比一輪</button>
    </div>
  </div>
</div>

<script>
(function() {
    "use strict";

    const K_NAMES = 'draw_v7_names'; // 全遊樂場共用名單
    const PENALTY = 1000; // 偷跑罰 1 秒
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const setupEl = document.getElementById('setup');
    const startBtn = document.getElementById('start-btn');
    const resetBtn = document.getElementById('reset-btn');
    const inputs = document.querySelectorAll('.p-input');
    const arena = document.getElementById('arena');
    const aTitle = document.getElementById('a-title');
    const aMain = document.getElementById('a-main');
    const aHint = document.getElementById('a-hint');
    const modal = document.getElementById('modal-overlay');
    const winnerText = document.getElementById('winner-text');
    const rankEl = document.getElementById('rank');
    const btnAgain = document.getElementById('btn-again');
    const btnEdit = document.getElementById('btn-edit');

    let players = [], results = [], cur = 0;
    // 狀態機: ready(等待點擊開始) / armed(紅色等變綠) / go(綠色快按) / shown(顯示成績)
    let state = 'off';
    let goTimer = null, goAt = 0;
    let audioCtx = null;

    try {
        const saved = JSON.parse(localStorage.getItem(K_NAMES) || 'null');
        if (Array.isArray(saved)) inputs.forEach((inp, i) => { if (saved[i]) inp.value = saved[i]; });
    } catch (e) {}

    function randInt(min, max) {
        const n = max - min + 1;
        const buf = new Uint32Array(1);
        const limit = Math.floor(0xFFFFFFFF / n) * n;
        let x;
        do { crypto.getRandomValues(buf); x = buf[0]; } while (x >= limit);
        return min + (x % n);
    }
    function vibrate(p) { if (!reduceMotion && navigator.vibrate) { try { navigator.vibrate(p); } catch (e) {} } }
    function safe(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function unlockAudio() {
        if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; } }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function sfx(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        if (type === 'go') {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(1500, now);
            g.gain.setValueAtTime(0.15, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
            o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now + 0.25);
        } else if (type === 'foul') {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sawtooth'; o.frequency.setValueAtTime(180, now);
            o.frequency.exponentialRampToValueAtTime(60, now + 0.4);
            g.gain.setValueAtTime(0.15, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now + 0.4);
        } else if (type === 'yay') {
            [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = 'triangle'; o.frequency.setValueAtTime(f, now + i * 0.1);
                g.gain.setValueAtTime(0.08, now + i * 0.1);
                g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.6);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.6);
            });
        }
    }

    function confetti() {
        if (reduceMotion) return;
        const c = document.getElementById('confetti');
        const x = c.getContext('2d');
        const W = c.width = window.innerWidth;
        const H = c.height = window.innerHeight;
        const colors = ['#f43f5e', '#f59e0b', '#22d3ee', '#34d399', '#a78bfa'];
        const P = Array.from({ length: 140 }, () => ({
            x: Math.random() * W, y: -20 - Math.random() * H * 0.3,
            r: 5 + Math.random() * 7, c: colors[Math.floor(Math.random() * colors.length)],
            vx: -2.5 + Math.random() * 5, vy: 3 + Math.random() * 4,
            rot: Math.random() * 6.28, vr: -0.25 + Math.random() * 0.5
        }));
        let t = 0;
        (function frame() {
            x.clearRect(0, 0, W, H);
            for (const p of P) {
                p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.rot += p.vr;
                x.save(); x.translate(p.x, p.y); x.rotate(p.rot);
                x.fillStyle = p.c; x.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
                x.restore();
            }
            t++;
            if (t < 200) requestAnimationFrame(frame);
            else x.clearRect(0, 0, W, H);
        })();
    }

    function showReady() {
        state = 'ready';
        arena.className = 'idle';
        aTitle.textContent = '輪到 ' + players[cur];
        aMain.textContent = '👆';
        aHint.textContent = '把手機給 ' + players[cur] + ',點一下畫面開始';
    }

    function arm() {
        state = 'armed';
        arena.className = 'armed';
        aMain.textContent = '🔴';
        aHint.textContent = '等畫面變綠再按!偷跑罰 1 秒';
        const delay = randInt(1500, 4200);
        goTimer = setTimeout(() => {
            state = 'go';
            arena.className = 'go';
            aMain.textContent = '💥 快按!';
            aHint.textContent = '';
            goAt = performance.now();
            sfx('go');
            vibrate(20);
        }, delay);
    }

    function record(ms, foul) {
        state = 'shown';
        results.push({ name: players[cur], ms: ms, foul: foul });
        arena.className = 'idle';
        aMain.innerHTML = foul
            ? '<span style="color:#fb7185">犯規!</span>'
            : '<span class="ms">' + ms + '</span><span style="font-size:1.2rem"> ms</span>';
        aHint.textContent = foul ? '偷跑 +' + PENALTY + 'ms,點一下繼續' : '點一下繼續';
        aTitle.textContent = players[cur] + ' 的成績';
        if (foul) { sfx('foul'); vibrate([0, 100, 60, 100]); } else { vibrate(15); }
    }

    function next() {
        cur++;
        if (cur < players.length) { showReady(); }
        else { finish(); }
    }

    function finish() {
        state = 'off';
        arena.style.display = 'none';
        const sorted = results.slice().sort((a, b) => a.ms - b.ms);
        const slowest = sorted[sorted.length - 1];
        winnerText.textContent = slowest.name;
        rankEl.innerHTML = sorted.map((r, i) =>
            '<li class="' + (i === sorted.length - 1 ? 'slowest' : '') + '">' +
            '<span class="pos">' + (i + 1) + '.</span>' +
            '<span class="nm">' + safe(r.name) + (r.foul ? ' 🚫' : '') + '</span>' +
            '<span class="tm">' + r.ms + ' ms</span></li>'
        ).join('');
        sfx('yay');
        confetti();
        vibrate([0, 60, 40, 60, 40, 130]);
        modal.style.display = 'flex';
    }

    function tapArena() {
        unlockAudio();
        if (state === 'ready') { arm(); }
        else if (state === 'armed') {
            // 偷跑
            clearTimeout(goTimer);
            record(PENALTY, true);
        }
        else if (state === 'go') {
            const ms = Math.round(performance.now() - goAt);
            record(ms, false);
        }
        else if (state === 'shown') { next(); }
    }

    function start() {
        unlockAudio();
        const raw = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
        players = Array.from(new Set(raw));
        if (players.length < 2) { alert('請至少輸入兩位參賽者!'); return; }
        localStorage.setItem(K_NAMES, JSON.stringify(Array.from(inputs).map(i => i.value)));
        results = [];
        cur = 0;
        modal.style.display = 'none';
        arena.style.display = 'flex';
        showReady();
    }

    startBtn.addEventListener('click', start);
    arena.addEventListener('pointerdown', tapArena);
    btnAgain.addEventListener('click', start);
    btnEdit.addEventListener('click', () => { modal.style.display = 'none'; });
    resetBtn.addEventListener('click', () => {
        localStorage.removeItem(K_NAMES);
        inputs.forEach(i => { i.value = ''; });
    });
    inputs.forEach(inp => inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); start(); }
    }));
})();
</script>
</body>
</html>
