<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>終極密碼 · 命運遊樂場</title>
<style>
:root{
  --bg:#0a0e1a; --card:rgba(255,255,255,.055); --border:rgba(255,255,255,.1);
  --text:#eef2ff; --muted:#8b93b0;
  --amber:#f59e0b; --gold:#fbbf24; --rose:#f43f5e; --cyan:#22d3ee; --violet:#a78bfa; --green:#34d399;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
  background:
    radial-gradient(900px 500px at 15% -10%, rgba(167,139,250,.16), transparent 60%),
    radial-gradient(900px 500px at 110% 20%, rgba(244,63,94,.1), transparent 55%),
    var(--bg);
  color:var(--text); min-height:100vh;
  display:flex; justify-content:center; align-items:flex-start;
  padding:calc(env(safe-area-inset-top) + 16px) 20px calc(env(safe-area-inset-bottom) + 20px);
  overflow-x:hidden;
}
.shell{width:100%;max-width:480px;display:flex;flex-direction:column;gap:16px}
.top{display:flex;align-items:center;gap:10px}
.back{
  text-decoration:none;color:var(--muted);font-size:.82rem;font-weight:800;
  background:var(--card);border:1px solid var(--border);border-radius:30px;padding:8px 14px;
}
.top h1{
  flex:1;text-align:center;font-size:1.45rem;font-weight:900;letter-spacing:1px;
  background:linear-gradient(92deg,var(--violet),var(--rose));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-right:78px;
}
.sub{text-align:center;color:var(--muted);font-size:.78rem;font-weight:700;margin-top:-8px}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:24px;padding:20px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ibox{display:flex;flex-direction:column;gap:6px}
.ibox label{font-size:.72rem;font-weight:800;color:var(--muted);padding-left:4px}
input[type=text],input[type=tel]{
  width:100%;padding:13px;border:2px solid var(--border);border-radius:14px;font-size:1rem;
  outline:none;background:rgba(255,255,255,.04);color:var(--text);
  transition:border-color .2s,background .2s;-webkit-appearance:none;
}
input::placeholder{color:#565e78}
input:focus{border-color:var(--violet);background:rgba(167,139,250,.07)}
.btn{
  width:100%;padding:19px;border:none;border-radius:20px;
  font-size:1.2rem;font-weight:900;letter-spacing:1px;cursor:pointer;color:#160b2e;
  background:linear-gradient(140deg,var(--violet),var(--rose));
  box-shadow:0 10px 28px -8px rgba(167,139,250,.55), inset 0 1px 0 rgba(255,255,255,.4);
  transition:transform .08s,opacity .2s;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4}
.ghost{
  background:transparent;border:none;color:var(--muted);font-size:.85rem;font-weight:700;
  text-decoration:underline;padding:10px;cursor:pointer;width:100%;
}
.foot{text-align:center;font-size:.66rem;color:var(--muted);letter-spacing:1px;line-height:1.8;opacity:.75}

/* 遊戲畫面 */
#play{display:none}
.range-box{text-align:center;padding:8px 0 2px}
.range-label{font-size:.72rem;font-weight:800;color:var(--muted);letter-spacing:2px}
.range{
  font-size:3.6rem;font-weight:900;letter-spacing:2px;line-height:1.1;
  background:linear-gradient(92deg,var(--violet),var(--cyan));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  transition:transform .15s;
}
.range.bump{animation:bump .35s ease}
@keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
.turn{
  text-align:center;font-size:1rem;font-weight:800;padding:12px;
  border-radius:16px;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);
}
.turn b{color:var(--violet);font-size:1.25rem}
.guess-row{display:flex;gap:10px;margin-top:14px}
.guess-row input{flex:1;text-align:center;font-size:1.4rem;font-weight:900;padding:15px}
.guess-row button{
  flex:none;width:110px;border:none;border-radius:14px;font-size:1.05rem;font-weight:900;cursor:pointer;
  color:#160b2e;background:linear-gradient(140deg,var(--violet),var(--rose));
}
.guess-row button:active{transform:scale(.96)}
.log{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.log .chip{
  background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);
  padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:700;
}
.log .chip b{color:var(--text)}

/* 彈窗 */
.overlay{
  position:fixed;inset:0;background:rgba(4,6,14,.9);display:none;
  justify-content:center;align-items:center;z-index:1000;padding:24px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.modal{
  background:#10162a;border:1px solid var(--border);
  width:100%;max-width:400px;border-radius:32px;padding:36px 24px 28px;text-align:center;
  box-shadow:0 30px 80px -12px rgba(0,0,0,.8);
  animation:mIn .5s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes mIn{0%{opacity:0;transform:scale(.8) translateY(40px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.w-tag{
  background:linear-gradient(92deg,var(--violet),var(--rose));color:#160b2e;
  padding:6px 16px;border-radius:30px;font-size:.9rem;font-weight:900;margin-bottom:18px;display:inline-block;
}
.w-name{
  font-size:3.2rem;font-weight:900;line-height:1.05;margin:12px 0;word-break:break-word;
  background:linear-gradient(92deg,var(--violet),var(--rose));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 6px 20px rgba(167,139,250,.4));
}
.w-meta{color:var(--muted);font-size:.95rem;margin-bottom:24px;font-weight:600}
.m-actions{display:flex;gap:10px}
.m-btn{flex:1;padding:17px 10px;border:none;border-radius:16px;font-size:1.02rem;font-weight:900;cursor:pointer;transition:transform .08s}
.m-btn:active{transform:scale(.96)}
.m-btn.again{background:linear-gradient(140deg,var(--violet),var(--rose));color:#160b2e}
.m-btn.edit{background:rgba(255,255,255,.09);color:var(--text);border:1px solid var(--border)}
#confetti{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1500}
</style>
</head>
<body>
<canvas id="confetti"></canvas>

<div class="shell">
  <div class="top">
    <a class="back" href="index.html">← 遊樂場</a>
    <h1>終極密碼 🔢</h1>
  </div>
  <div class="sub">1~100 輪流夾擊 · 猜中密碼的人買單</div>

  <!-- 設定畫面 -->
  <div id="setup">
    <div class="card">
      <div class="input-grid">
        <div class="ibox"><label>1</label><input type="text" class="p-input" placeholder="名字" maxlength="10"></div>
        <div class="ibox"><label>2</label><input type="text" class="p-input" placeholder="名字" maxlength="10"></div>
        <div class="ibox"><label>3</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
        <div class="ibox"><label>4</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
        <div class="ibox"><label>5</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
        <div class="ibox"><label>6</label><input type="text" class="p-input" placeholder="選填" maxlength="10"></div>
      </div>
    </div>
    <div style="height:14px"></div>
    <button id="start-btn" class="btn">🔢 產生密碼開局</button>
    <button id="reset-btn" class="ghost">清空名單</button>
  </div>

  <!-- 遊戲畫面 -->
  <div id="play">
    <div class="card">
      <div class="range-box">
        <div class="range-label">密碼藏在</div>
        <div class="range" id="range">1 ~ 100</div>
      </div>
      <div class="turn" id="turn">輪到 <b>—</b></div>
      <div class="guess-row">
        <input type="tel" id="guess-input" inputmode="numeric" pattern="[0-9]*" placeholder="?" maxlength="3">
        <button id="guess-btn">猜!</button>
      </div>
      <div class="log" id="log"></div>
    </div>
    <div style="height:14px"></div>
    <button id="abort-btn" class="ghost">放棄這局,重新開始</button>
  </div>

  <div class="foot">100% 離線可玩 · CRYPTO 公平亂數 · FATE ARCADE</div>
</div>

<div id="modal-overlay" class="overlay">
  <div class="modal">
    <div class="w-tag">💥 密碼命中</div>
    <div id="winner-text" class="w-name">---</div>
    <div class="w-meta" id="winner-meta">猜中了!這攤你請 💸</div>
    <div class="m-actions">
      <button id="btn-edit" class="m-btn edit">改名單</button>
      <button id="btn-again" class="m-btn again">再來一局</button>
    </div>
  </div>
</div>

<script>
(function() {
    "use strict";

    const K_NAMES = 'draw_v7_names'; // 全遊樂場共用名單
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const setupEl = document.getElementById('setup');
    const playEl = document.getElementById('play');
    const startBtn = document.getElementById('start-btn');
    const resetBtn = document.getElementById('reset-btn');
    const abortBtn = document.getElementById('abort-btn');
    const inputs = document.querySelectorAll('.p-input');
    const rangeEl = document.getElementById('range');
    const turnEl = document.getElementById('turn');
    const guessInput = document.getElementById('guess-input');
    const guessBtn = document.getElementById('guess-btn');
    const logEl = document.getElementById('log');
    const modal = document.getElementById('modal-overlay');
    const winnerText = document.getElementById('winner-text');
    const winnerMeta = document.getElementById('winner-meta');
    const btnAgain = document.getElementById('btn-again');
    const btnEdit = document.getElementById('btn-edit');

    let players = [], secret = 0, lo = 0, hi = 101, turn = 0, guesses = 0, playing = false;
    let audioCtx = null;

    try {
        const saved = JSON.parse(localStorage.getItem(K_NAMES) || 'null');
        if (Array.isArray(saved)) inputs.forEach((inp, i) => { if (saved[i]) inp.value = saved[i]; });
    } catch (e) {}

    function randInt(min, max) { // [min, max] 含端點,無偏
        const n = max - min + 1;
        const buf = new Uint32Array(1);
        const limit = Math.floor(0xFFFFFFFF / n) * n;
        let x;
        do { crypto.getRandomValues(buf); x = buf[0]; } while (x >= limit);
        return min + (x % n);
    }

    function vibrate(p) { if (!reduceMotion && navigator.vibrate) { try { navigator.vibrate(p); } catch (e) {} } }
    function safe(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function unlockAudio() {
        if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; } }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function sfx(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        if (type === 'blip') {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(880, now);
            g.gain.setValueAtTime(0.08, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now + 0.15);
        } else if (type === 'boom') {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sawtooth'; o.frequency.setValueAtTime(200, now);
            o.frequency.exponentialRampToValueAtTime(40, now + 0.6);
            g.gain.setValueAtTime(0.2, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
            o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now + 0.6);
        }
    }

    function confetti() {
        if (reduceMotion) return;
        const c = document.getElementById('confetti');
        const x = c.getContext('2d');
        const W = c.width = window.innerWidth;
        const H = c.height = window.innerHeight;
        const colors = ['#a78bfa', '#f43f5e', '#22d3ee', '#f59e0b', '#34d399'];
        const P = Array.from({ length: 140 }, () => ({
            x: Math.random() * W, y: -20 - Math.random() * H * 0.3,
            r: 5 + Math.random() * 7, c: colors[Math.floor(Math.random() * colors.length)],
            vx: -2.5 + Math.random() * 5, vy: 3 + Math.random() * 4,
            rot: Math.random() * 6.28, vr: -0.25 + Math.random() * 0.5
        }));
        let t = 0;
        (function frame() {
            x.clearRect(0, 0, W, H);
            for (const p of P) {
                p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.rot += p.vr;
                x.save(); x.translate(p.x, p.y); x.rotate(p.rot);
                x.fillStyle = p.c; x.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
                x.restore();
            }
            t++;
            if (t < 200) requestAnimationFrame(frame);
            else x.clearRect(0, 0, W, H);
        })();
    }

    function render() {
        rangeEl.textContent = (lo + 1) + ' ~ ' + (hi - 1);
        rangeEl.classList.remove('bump');
        void rangeEl.offsetWidth;
        rangeEl.classList.add('bump');
        turnEl.innerHTML = '輪到 <b>' + safe(players[turn]) + '</b>';
        guessInput.value = '';
        guessInput.focus();
    }

    function start() {
        unlockAudio();
        const raw = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
        players = Array.from(new Set(raw));
        if (players.length < 2) { alert('請至少輸入兩位參賽者!'); return; }
        localStorage.setItem(K_NAMES, JSON.stringify(Array.from(inputs).map(i => i.value)));

        secret = randInt(1, 100);
        lo = 0; hi = 101; guesses = 0;
        turn = randInt(0, players.length - 1); // 隨機起手,公平
        playing = true;
        logEl.innerHTML = '';
        setupEl.style.display = 'none';
        playEl.style.display = 'block';
        render();
    }

    function doGuess() {
        if (!playing) return;
        unlockAudio();
        const v = parseInt(guessInput.value, 10);
        if (isNaN(v) || v <= lo || v >= hi) {
            alert('要猜 ' + (lo + 1) + ' ~ ' + (hi - 1) + ' 之間的數字!');
            guessInput.value = '';
            return;
        }
        guesses++;
        const who = players[turn];
        if (v === secret) {
            playing = false;
            sfx('boom');
            vibrate([0, 80, 50, 80, 50, 200]);
            confetti();
            winnerText.textContent = who;
            winnerMeta.textContent = '密碼就是 ' + secret + '!第 ' + guesses + ' 手中獎,這攤你請 💸';
            setTimeout(() => { modal.style.display = 'flex'; }, 300);
            return;
        }
        sfx('blip');
        vibrate(12);
        const dir = v < secret ? '↑' : '↓';
        if (v < secret) lo = v; else hi = v;
        logEl.insertAdjacentHTML('afterbegin',
            '<span class="chip"><b>' + safe(who) + '</b> 猜 ' + v + ' ' + dir + '</span>');
        turn = (turn + 1) % players.length;
        render();
    }

    function backToSetup() {
        playing = false;
        modal.style.display = 'none';
        playEl.style.display = 'none';
        setupEl.style.display = 'block';
    }

    startBtn.addEventListener('click', start);
    guessBtn.addEventListener('click', doGuess);
    guessInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); doGuess(); } });
    abortBtn.addEventListener('click', backToSetup);
    btnAgain.addEventListener('click', () => { modal.style.display = 'none'; start(); });
    btnEdit.addEventListener('click', backToSetup);
    resetBtn.addEventListener('click', () => {
        localStorage.removeItem(K_NAMES);
        inputs.forEach(i => { i.value = ''; });
    });
    inputs.forEach(inp => inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); start(); }
    }));
})();
</script>
</body>
</html>
